services:
  mongo:
    image: mongo:6-jammy
    container_name: analytics-mongo-dev
    volumes:
      - mongo_data_dev:/data/db
    restart: unless-stopped
    networks:
      - analytics-network-dev

  redis:
    image: redis:7-alpine
    container_name: analytics-redis-dev
    restart: unless-stopped
    networks:
      - analytics-network-dev

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: analytics-server-dev
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/analytics-bi
      - REDIS_HOST=redis
      - NODE_ENV=development
      - CORS_ORIGIN=*
    depends_on:
      - mongo
      - redis
    networks:
      - analytics-network-dev

  host:
    image: node:20-slim
    container_name: analytics-host-dev
    working_dir: /workspace
    command: sh -c "npm run dev -w apps/host -- --host 0.0.0.0"
    volumes:
      - ./:/workspace
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - server
    networks:
      - analytics-network-dev

  mfe-auth:
    image: node:20-slim
    container_name: analytics-mfe-auth-dev
    working_dir: /workspace
    command: sh -c "npm run dev -w apps/mfe-auth -- --host 0.0.0.0"
    volumes:
      - ./:/workspace
    ports:
      - "5001:5001"
    networks:
      - analytics-network-dev

  mfe-analytics:
    image: node:20-slim
    container_name: analytics-mfe-analytics-dev
    working_dir: /workspace
    command: sh -c "npm run dev -w apps/mfe-analytics -- --host 0.0.0.0"
    volumes:
      - ./:/workspace
    ports:
      - "5002:5002"
    networks:
      - analytics-network-dev

  mfe-data-mgmt:
    image: node:20-slim
    container_name: analytics-mfe-data-dev
    working_dir: /workspace
    command: sh -c "npm run dev -w apps/mfe-data-mgmt -- --host 0.0.0.0"
    volumes:
      - ./:/workspace
    ports:
      - "5003:5003"
    networks:
      - analytics-network-dev

  mfe-tools:
    image: node:20-slim
    container_name: analytics-mfe-tools-dev
    working_dir: /workspace
    command: sh -c "npm run dev -w apps/mfe-tools -- --host 0.0.0.0"
    volumes:
      - ./:/workspace
    ports:
      - "5004:5004"
    networks:
      - analytics-network-dev

networks:
  analytics-network-dev:
    driver: bridge

volumes:
  mongo_data_dev:
