<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics-BI Embed Preview</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
            font-family: monospace;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
        #viewport {
            margin-top: 20px;
            border: 1px solid #ccc;
            min-height: 400px;
            background: #f9f9f9;
        }
        iframe {
            width: 100%;
            height: 600px;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Analytics-BI Embed Preview</h1>
    <p>Paste your iframe snippet below and click "Preview" to see how it looks.</p>
    
    <label for="embedSnippet">Iframe Snippet:</label><br>
    <textarea id="embedSnippet" placeholder='<iframe src="..." width="100%" height="600"></iframe>'></textarea>
    
    <br>
    <button id="renderBtn">Preview</button>

    <div id="viewport">
        <p style="text-align: center; padding-top: 180px; color: #666;">Preview will appear here</p>
    </div>
</div>

<script>
    const renderBtn = document.getElementById('renderBtn');
    const snippetInput = document.getElementById('embedSnippet');
    const viewport = document.getElementById('viewport');

    renderBtn.addEventListener('click', () => {
        const snippet = snippetInput.value.trim();
        
        if (!snippet) {
            alert('Please provide an iframe snippet.');
            return;
        }

        if (!snippet.toLowerCase().includes('<iframe')) {
            alert('Invalid snippet. Please ensure you are pasting an <iframe> tag.');
            return;
        }

        viewport.innerHTML = snippet;
    });
</script>

</body>
</html>
