<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Resizable ECharts Widget</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    /* Dashboard widget container */
    .widget {
      width: 600px;
      height: 400px;
      resize: both;              /* 🔥 enables manual resize */
      overflow: hidden;
      border: 2px solid #ccc;
      border-radius: 10px;
      background: #fff;
    }

    /* Chart fills container */
    #chart {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

  <div class="widget">
    <div id="chart"></div>
  </div>

  <script>
    const chartDom = document.getElementById('chart');
    const myChart = echarts.init(chartDom);

    const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const sales = [150, 230, 224, 218, 135, 147, 260];
    const orders = [320, 332, 301, 334, 390, 330, 320];

    const option = {
      title: { text: 'Sales Dashboard', left: 'center' },
      tooltip: { trigger: 'axis' },
      axisPointer: { link: [{ xAxisIndex: 'all' }] },

      grid: [
        { top: '10%', height: '35%' },
        { top: '55%', height: '35%' }
      ],

      xAxis: [
        { type: 'category', data: days, gridIndex: 0 },
        { type: 'category', data: days, gridIndex: 1 }
      ],

      yAxis: [
        { type: 'value', name: 'Sales', gridIndex: 0 },
        { type: 'value', name: 'Orders', gridIndex: 1 }
      ],

      dataZoom: [
        { type: 'inside', xAxisIndex: [0, 1] },
        { type: 'slider', xAxisIndex: [0, 1] }
      ],

      series: [
        {
          name: 'Sales',
          type: 'line',
          data: sales,
          smooth: true,
          xAxisIndex: 0,
          yAxisIndex: 0
        },
        {
          name: 'Orders',
          type: 'bar',
          data: orders,
          xAxisIndex: 1,
          yAxisIndex: 1
        }
      ]
    };

    myChart.setOption(option);

    // 🔥 Better resize detection (not just window)
    const resizeObserver = new ResizeObserver(() => {
      myChart.resize();
    });

    resizeObserver.observe(document.querySelector('.widget'));
  </script>

</body>
</html>
