services:
  mongo:
    image: mongo:6-jammy
    container_name: analytics-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - analytics-network

  redis:
    image: redis:7-alpine
    container_name: analytics-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - analytics-network

  server:
    image: node:20-slim
    container_name: analytics-server
    working_dir: /app
    command: npm run dev -w apps/server
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/analytics-bi
      - REDIS_HOST=redis
      - NODE_ENV=development
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      - mongo
      - redis
    networks:
      - analytics-network

  client:
    image: node:20-slim
    container_name: analytics-client
    working_dir: /app
    command: npm run dev -w apps/client -- --host 0.0.0.0
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - server
    networks:
      - analytics-network

networks:
  analytics-network:
    driver: bridge

volumes:
  mongo_data:
